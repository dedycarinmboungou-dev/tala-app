services:
  - type: web
    name: tala-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: tala-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/tala.db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_REDIRECT_URI
        sync: false
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_ENV
        value: live
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        value: hello@tala.app
      - key: BREVO_FROM_NAME
        value: Tala
      - key: ADMIN_EMAIL
        sync: false
      - key: APP_URL
        sync: false
